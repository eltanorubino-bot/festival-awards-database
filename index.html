<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Awards Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #14181c;
      --card: #1b2028;
      --text: #e0e0e0;
      --muted: #7f8c93;
      --cannes: #d4af37;
      --venice: #c0392b;
      --berlin: #8e44ad;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 20px;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeIn 0.6s ease;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .search-bar {
      margin: 30px 0;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .search-bar input {
      padding: 12px 20px;
      border: 1px solid var(--muted);
      background: var(--card);
      color: var(--text);
      border-radius: 4px;
      font-size: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .search-bar input::placeholder {
      color: var(--muted);
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--cannes);
    }

    .year-grid {
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .year-grid h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 30px;
    }

    .years {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    @media (max-width: 768px) {
      .years {
        grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
        gap: 8px;
      }
    }

    .yr-btn {
      padding: 15px 10px;
      background: var(--card);
      border: 1px solid var(--muted);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 500;
      transition: all 0.3s;
    }

    .yr-btn:hover {
      border-color: var(--cannes);
      transform: translateY(-2px);
    }

    .yr-dots {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      justify-content: center;
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-c { background: var(--cannes); }
    .dot-v { background: var(--venice); }
    .dot-b { background: var(--berlin); }

    .fest-section { animation: fadeIn 0.6s ease; }

    .back-btn {
      padding: 10px 20px;
      background: var(--card);
      border: 1px solid var(--muted);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 30px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      border-color: var(--text);
      background: rgba(224, 224, 224, 0.05);
    }

    .section-hdr {
      margin-bottom: 30px;
      text-align: center;
    }

    .section-hdr h3 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
    }

    .year-title {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 5px;
    }

    .fest-tabs {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .fest-tab {
      padding: 20px;
      background: var(--card);
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      flex: 0 1 150px;
      animation: fadeIn 0.6s ease;
    }

    .fest-tab:hover { transform: translateY(-4px); }

    .ft-icon { font-size: 2rem; margin-bottom: 10px; }

    .ft-name {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .c-cannes { color: var(--cannes); }
    .c-venice { color: var(--venice); }
    .c-berlin { color: var(--berlin); }

    .fest-tab:has(.c-cannes):hover { border-color: var(--cannes); background: rgba(212, 175, 55, 0.1); }
    .fest-tab:has(.c-venice):hover { border-color: var(--venice); background: rgba(192, 57, 43, 0.1); }
    .fest-tab:has(.c-berlin):hover { border-color: var(--berlin); background: rgba(142, 68, 173, 0.1); }

    .section-hdr h3 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .section-hdr h3 .logo-img,
    .section-hdr h3 .fest-logo-svg {
      width: 48px;
      height: 48px;
    }

    .fest-tab .logo-img,
    .fest-tab .fest-logo-svg {
      width: 48px;
      height: 48px;
    }

    .awards-container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 30px;
    }

    .award-row {
      animation: fadeIn 0.6s ease;
      background: var(--card);
      border-radius: 8px;
      padding: 20px;
    }

    .award-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--muted);
      color: var(--text);
    }

    .carousel {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 5px 0;
    }

    @media (max-width: 600px) {
      .carousel {
        grid-template-columns: 1fr;
      }
    }

    .carousel::-webkit-scrollbar { height: 6px; }
    .carousel::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
    .carousel::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 10px; }
    .carousel::-webkit-scrollbar-thumb:hover { background: var(--text); }

    .film-card {
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 6px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      padding: 8px;
      position: relative;
    }

    .film-card:hover {
      background: rgba(255,255,255,0.08);
      transform: none;
    }

    .film-poster {
      width: 100px;
      height: 150px;
      object-fit: cover;
      object-position: center;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .film-overlay {
      display: none;
    }

    .film-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .film-info .winner-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .film-info .film-title {
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 2px;
    }

    .film-info .film-director {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .film-title {
      font-weight: 600;
      font-size: 0.85rem;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .film-director {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .no-poster {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      text-align: center;
      padding: 20px;
      color: var(--muted);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      overflow-y: auto;
      animation: fadeIn 0.3s ease;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--card);
      border-radius: 8px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.3s ease;
    }

    @media (max-width: 768px) {
      .modal-content {
        padding: 20px;
        width: 95%;
      }
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 5px 10px;
      transition: color 0.3s;
    }

    .modal-close:hover { color: var(--cannes); }

    .modal-poster {
      width: 100%;
      max-width: 250px;
      margin: 0 auto 20px;
      border-radius: 6px;
      display: block;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .modal-meta {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .modal-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .modal-award {
      color: var(--cannes);
      font-weight: 600;
      margin-bottom: 15px;
    }

    .modal-synopsis {
      line-height: 1.6;
      margin-bottom: 20px;
      color: var(--text);
    }

    .search-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      padding: 20px 0;
    }

    @media (max-width: 768px) {
      .search-results {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(212, 175, 55, 0.05);
      border-radius: 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .stats-bar { display: none; }
    }

    .logo-img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      margin-bottom: 8px;
    }

    .fest-logo-svg {
      width: 40px;
      height: 40px;
      margin-bottom: 8px;
      color: currentColor;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>Festival Awards Database</h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search films, directors, awards...">
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div id="app"></div>

<div class="modal" id="filmModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

function render(){
  const app = document.getElementById('app');
  const q = state.search.toLowerCase();
  if(q) renderSearch(app, q);
  else if(state.view==='years') renderYears(app);
  else if(state.view==='festivals') renderFestivals(app);
  else if(state.view==='awards') renderAwards(app);
  updateStats();
}

function renderYears(app){
  const years = Object.keys(DATA).sort((a,b)=>b-a);
  app.innerHTML = `
    <div class="year-grid">
      <h2>Select a Year</h2>
      <div class="years">
        ${years.map(y=>`
          <button class="yr-btn fade-in" onclick="selectYear(${y})">
            ${y}<div class="yr-dots">
            ${DATA[y].cannes?'<span class="dot dot-c"></span>':''}
            ${DATA[y].venice?'<span class="dot dot-v"></span>':''}
            ${DATA[y].berlin?'<span class="dot dot-b"></span>':''}
            </div>
          </button>
        `).join('')}
      </div>
    </div>`;
}

function renderFestivals(app){
  const y = state.year;
  const fests = DATA[y];
  app.innerHTML = `
    <div class="fest-section">
      <button class="back-btn" onclick="goBack('years')">← All Years</button>
      <div class="section-hdr">
        <h3>Festivals ${y}</h3>
        <div class="year-title">${y}</div>
      </div>
      <div class="fest-tabs">
        ${Object.keys(fests).map(f=>`
          <div class="fest-tab fade-in" onclick="selectFestival('${f}')">
            <div>${festLogos[f]}</div>
            <div class="ft-name c-${f}">${festNames[f]}</div>
            <div style="font-size:.7rem;color:var(--muted);margin-top:4px">${fests[f].length} awards</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function renderAwards(app){
  const y = state.year, f = state.festival;
  const awards = DATA[y][f];
  const grouped = {};
  awards.forEach(a=>{if(!grouped[a.award])grouped[a.award]=[];grouped[a.award].push(a);});
  app.innerHTML = `
    <div class="fest-section">
      <button class="back-btn" onclick="goBack('festivals')">← ${y} · Festivals</button>
      <div class="section-hdr">
        <h3>${festLogos[f]} ${festNames[f]} ${y}</h3>
        <div class="year-title">${Object.keys(grouped).length} categories</div>
      </div>
      <div class="awards-container">
        ${Object.keys(grouped).map(award=>`
          <div class="award-row">
            <div class="award-title" style="border-bottom-color: var(--${f})">${award}</div>
            <div class="carousel">
              ${grouped[award].map(film=>{
                const personalAwards = ['Mejor Actor','Mejor Actriz','Mejor Director','Mejor Interpretación','Mejor Interpretación Secundaria'];
                const isPersonal = personalAwards.includes(award);
                const winnerName = isPersonal ? (film.cast || film.director) : '';
                return `
                <div class="film-card" onclick="openModal('${film.title.replace(/'/g,"\\'")}', '${y}', '${f}')">
                  ${film.poster ? `<img src="${film.poster}" alt="${film.title}" class="film-poster" onerror="this.style.display='none'">` : ''}
                  <div class="film-info">
                    ${isPersonal && winnerName ? `<div class="winner-name">${winnerName}</div>` : ''}
                    <div class="film-title">${film.title}</div>
                    <div class="film-director">${isPersonal ? '' : film.director}</div>
                  </div>
                </div>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function renderSearch(app, q){
  const results = [];
  for(const yr of Object.keys(DATA)){
    for(const fest of Object.keys(DATA[yr])){
      for(const film of DATA[yr][fest]){
        if(film.title.toLowerCase().includes(q) || film.director.toLowerCase().includes(q) || film.award.toLowerCase().includes(q)) results.push({...film, year: yr, festival: fest});
      }
    }
  }
  app.innerHTML = `
    <div class="fest-section">
      <div class="section-hdr"><h3>Search Results</h3><div class="year-title">${results.length} results for "${q}"</div></div>
      <div class="search-results">
        ${results.slice(0, 50).map(film=>`
          <div class="film-card" onclick="openModal('${film.title}', '${film.year}', '${film.festival}')">
            ${film.poster ? `<img src="${film.poster}" alt="${film.title}" class="film-poster" onerror="this.parentElement.innerHTML='<div class=&quot;no-poster&quot;>No poster</div>'">` : `<div class="no-poster">${film.title}</div>`}
            <div class="film-overlay">
              <div class="film-title">${film.title}</div>
              <div class="film-director">${film.director}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function openModal(title, year, fest){
  const film = DATA[year][fest].find(f => f.title === title);
  if(!film) return;
  let html = '';
  if(film.poster) html += `<img src="${film.poster}" alt="${film.title}" class="modal-poster" onerror="this.style.display='none'">`;
  html += `
    <h2 class="modal-title">${film.title}</h2>
    <div class="modal-meta">
      <span>🏆 <strong>${film.award}</strong></span>
      <span>📽️ ${film.director}</span>
      <span>🌍 ${film.country}</span>
      <span>📅 ${year}</span>
    </div>
    <div class="modal-award">${festNames[fest]}</div>
    ${film.cast ? `<div class="modal-meta"><span>👥 ${film.cast}</span></div>` : ''}
    ${film.synopsis ? `<div class="modal-synopsis">${film.synopsis}</div>` : ''}
  `;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('filmModal').classList.add('show');
}

function closeModal(){ document.getElementById('filmModal').classList.remove('show'); }
function selectYear(y){ state.year = y; state.view = 'festivals'; render(); }
function selectFestival(f){ state.festival = f; state.view = 'awards'; render(); }
function goBack(v){ state.view = v; if(v === 'years') state.year = null; render(); }

function updateStats(){
  const bar = document.getElementById('statsBar');
  let totalFilms = 0;
  for(const yr of Object.keys(DATA)){
    for(const fest of Object.keys(DATA[yr])){
      totalFilms += DATA[yr][fest].length;
    }
  }
  bar.innerHTML = `<span>📽️ ${totalFilms} Films</span><span>📅 ${Object.keys(DATA).length} Years</span><span>🎬 3 Festivals</span>`;
}

document.getElementById('searchInput').addEventListener('input', (e) => { state.search = e.target.value; render(); });
document.getElementById('filmModal').addEventListener('click', (e) => { if(e.target.id === 'filmModal') closeModal(); });

render();
</script>

</body>
</html>
