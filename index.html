<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Awards Database By Fer Rubino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --text: #ffffff;
      --muted: #888888;
      --cannes: #d4af37;
      --venice: #c0392b;
      --berlin: #8e44ad;
      --toronto: #e74c3c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ═══ ATMOSPHERE BACKGROUND ═══ */
    .bg-atmosphere {
      position: fixed; top:0; left:0; right:0; bottom:0;
      z-index:0; overflow:hidden; pointer-events:none;
    }
    .bg-atmosphere::before {
      content:''; position:absolute; top:-15%; left:-5%;
      width:55%; height:65%;
      background: radial-gradient(ellipse, rgba(20,80,80,0.18) 0%, transparent 70%);
      filter: blur(90px);
    }
    .bg-atmosphere::after {
      content:''; position:absolute; bottom:-10%; right:-5%;
      width:45%; height:55%;
      background: radial-gradient(ellipse, rgba(40,60,90,0.15) 0%, transparent 70%);
      filter: blur(80px);
    }

    .page-content {
      position: relative;
      z-index: 1;
      padding: 24px 40px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* ═══ HEADER ═══ */
    header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
      animation: fadeIn 0.6s ease;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      line-height: 1;
    }
    .author-tag {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }

    /* ═══ SEARCH BAR ═══ */
    .search-bar {
      margin-bottom: 20px;
    }
    .search-bar input {
      padding: 14px 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      width: 100%;
      max-width: 450px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.3s;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.3); }
    .search-bar input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
    }

    /* ═══ STATS BAR ═══ */
    .stats-bar {
      display: flex;
      gap: 28px;
      padding: 14px 0;
      margin-bottom: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ═══ YEAR GRID (home) ═══ */
    .year-grid { animation: fadeIn 0.6s ease; }
    .year-grid h2 {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      margin-bottom: 20px;
    }

    .years {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      max-width: 1200px;
      margin-bottom: 40px;
    }

    .yr-btn {
      position: relative;
      padding: 22px 16px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.5px;
      transition: all 0.3s;
      text-align: center;
      overflow: hidden;
    }
    .yr-btn:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      color: var(--text);
    }
    .yr-dots {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      justify-content: center;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-c { background: var(--cannes); }
    .dot-v { background: var(--venice); }
    .dot-b { background: var(--berlin); }
    .dot-t { background: var(--toronto); }

    /* ═══ YEAR SCROLLER (horizontal) ═══ */
    .year-scroller-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .year-scroller {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 14px 44px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-behavior: smooth;
    }
    .year-scroller::-webkit-scrollbar { display: none; }

    .ys-arrow {
      position: absolute;
      top: 0; bottom: 0;
      width: 40px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.6rem;
      cursor: pointer;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .ys-arrow:hover { opacity: 1; }
    .ys-arrow.left {
      left: 0;
      background: linear-gradient(to right, var(--bg) 60%, transparent);
      padding-right: 8px;
    }
    .ys-arrow.right {
      right: 0;
      background: linear-gradient(to left, var(--bg) 60%, transparent);
      padding-left: 8px;
    }

    .year-scroller .ys-btn {
      flex-shrink: 0;
      padding: 10px 20px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: rgba(255,255,255,0.35);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .year-scroller .ys-btn:hover {
      border-color: rgba(255,255,255,0.25);
      color: var(--text);
      background: rgba(255,255,255,0.05);
      transform: scale(1.08);
    }
    .year-scroller .ys-btn.active {
      background: rgba(255,255,255,0.95);
      color: var(--bg);
      border-color: transparent;
      transform: scale(1.08);
    }

    /* ═══ BACK BUTTON ═══ */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 50px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-bottom: 16px;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
    }

    /* ═══ FESTIVAL SECTION ═══ */
    .fest-section { animation: fadeIn 0.6s ease; }

    .section-hdr {
      margin-bottom: 24px;
    }
    .section-hdr h3 {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
      line-height: 1;
    }
    .section-hdr h3 .logo-img,
    .section-hdr h3 .fest-logo-svg {
      width: 48px; height: 48px;
    }
    .year-title {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.25);
      margin-top: 6px;
      letter-spacing: 2px;
      font-weight: 500;
    }

    /* ═══ FESTIVAL TABS ═══ */
    .fest-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 30px;
      max-width: 1000px;
    }
    .fest-tab {
      position: relative;
      padding: 28px 20px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      overflow: hidden;
      animation: fadeIn 0.6s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .fest-tab:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.12);
    }
    .fest-tab .fest-glow {
      position: absolute;
      top: -30px; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 100px;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .fest-tab:hover .fest-glow { opacity: 0.2; }

    .ft-icon { font-size: 1.6rem; margin-bottom: 10px; }
    .ft-name {
      font-weight: 800;
      font-size: 1.1rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
    }
    .ft-count {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      font-weight: 500;
    }

    .c-cannes { color: var(--cannes); }
    .c-venice { color: var(--venice); }
    .c-berlin { color: var(--berlin); }
    .c-toronto { color: var(--toronto); }

    .fest-tab:has(.c-cannes) .fest-glow { background: var(--cannes); }
    .fest-tab:has(.c-venice) .fest-glow { background: var(--venice); }
    .fest-tab:has(.c-berlin) .fest-glow { background: var(--berlin); }
    .fest-tab:has(.c-toronto) .fest-glow { background: var(--toronto); }

    .fest-tab:has(.c-cannes):hover { border-color: rgba(212,175,55,0.3); }
    .fest-tab:has(.c-venice):hover { border-color: rgba(192,57,43,0.3); }
    .fest-tab:has(.c-berlin):hover { border-color: rgba(142,68,173,0.3); }
    .fest-tab:has(.c-toronto):hover { border-color: rgba(231,76,60,0.3); }

    .fest-tab:has(.c-cannes):hover .ft-name { transform: scale(1.1); }
    .fest-tab:has(.c-venice):hover .ft-name { transform: scale(1.1); }
    .fest-tab:has(.c-berlin):hover .ft-name { transform: scale(1.1); }
    .fest-tab:has(.c-toronto):hover .ft-name { transform: scale(1.1); }

    .logo-img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
    .fest-logo-svg { width: 40px; height: 40px; margin-bottom: 8px; }

    /* ═══ AWARDS GRID ═══ */
    .awards-container {
      max-width: 1400px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }
    .award-row {
      animation: fadeIn 0.6s ease;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .award-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* Per-festival award title colors */
    .award-cannes .award-title { color: var(--cannes); }
    .award-venice .award-title { color: var(--venice); }
    .award-berlin .award-title { color: var(--berlin); }
    .award-toronto .award-title { color: var(--toronto); }

    .carousel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 0;
    }

    .film-card {
      display: flex;
      gap: 14px;
      cursor: pointer;
      transition: all 0.25s;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      padding: 10px;
      position: relative;
    }
    .film-card:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-1px);
    }
    .film-poster {
      width: 80px;
      height: 120px;
      object-fit: cover;
      object-position: center;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .film-overlay { display: none; }

    .film-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }
    .film-info .winner-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }
    .film-info .film-title {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .film-info .film-director {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
    }
    .no-poster {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; text-align: center;
      padding: 10px; color: rgba(255,255,255,0.2);
    }

    /* ═══ SEARCH RESULTS ═══ */
    .search-results {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 0;
      max-width: 900px;
    }
    .search-result-card {
      display: flex;
      gap: 16px;
      align-items: center;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .search-result-card:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
    }
    .sr-poster {
      width: 48px; height: 72px;
      border-radius: 6px; overflow: hidden; flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }
    .sr-poster img { width:100%; height:100%; object-fit:cover; }
    .sr-info { flex:1; min-width:0; }
    .sr-title { font-size:0.9rem; font-weight:700; margin-bottom:2px; }
    .sr-director { font-size:0.72rem; color:rgba(255,255,255,0.4); margin-bottom:4px; }
    .sr-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .sr-tag {
      font-size:0.58rem; font-weight:600; letter-spacing:1.5px;
      text-transform:uppercase; padding:2px 7px;
      border-radius:4px;
    }
    .sr-tag.cannes { color:#d4af37; border:1px solid rgba(212,175,55,0.2); background:rgba(212,175,55,0.06); }
    .sr-tag.venice { color:#c0392b; border:1px solid rgba(192,57,43,0.2); background:rgba(192,57,43,0.06); }
    .sr-tag.berlin { color:#9b59b6; border:1px solid rgba(155,89,182,0.2); background:rgba(155,89,182,0.06); }
    .sr-tag.toronto { color:#e74c3c; border:1px solid rgba(231,76,60,0.2); background:rgba(231,76,60,0.06); }
    .sr-tag.year { color:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03); }
    .sr-award { font-size:0.6rem; color:rgba(255,255,255,0.25); }

    /* ═══ MODAL ═══ */
    .modal {
      display: none;
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000;
      overflow-y: auto;
      animation: fadeIn 0.3s ease;
    }
    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: rgba(20,20,20,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 36px;
      max-width: 600px;
      width: 92%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.3s ease;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .modal-close {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); }
    .modal-poster {
      width: 100%;
      max-width: 220px;
      margin: 0 auto 20px;
      border-radius: 12px;
      display: block;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .modal-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .modal-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      flex-wrap: wrap;
    }
    .modal-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .modal-award {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }
    .modal-award.cannes { color:#d4af37; background:rgba(212,175,55,0.08); border:1px solid rgba(212,175,55,0.2); }
    .modal-award.venice { color:#c0392b; background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.2); }
    .modal-award.berlin { color:#9b59b6; background:rgba(155,89,182,0.08); border:1px solid rgba(155,89,182,0.2); }
    .modal-award.toronto { color:#e74c3c; background:rgba(231,76,60,0.08); border:1px solid rgba(231,76,60,0.2); }
    .modal-synopsis {
      line-height: 1.7;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }

    /* ═══ ANIMATIONS ═══ */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ═══ BOTTOM BAR ═══ */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      padding: 20px 0;
      margin-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .bottom-bar span {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.15);
      text-transform: uppercase;
    }

    /* ═══ MOBILE ═══ */
    @media (max-width: 768px) {
      .page-content { padding: 16px 20px; }
      header h1 { font-size: 1.1rem; }
      .author-tag { font-size: 0.7rem; }

      .years {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .yr-btn {
        padding: 16px 10px;
        font-size: 1rem;
        border-radius: 10px;
      }

      .year-scroller .ys-btn {
        padding: 8px 14px;
        font-size: 0.85rem;
      }
      .ys-arrow { width: 32px; font-size: 1.3rem; }
      .year-scroller { padding: 12px 32px; }

      .fest-tabs {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .fest-tab { padding: 20px 14px; }
      .ft-name { font-size: 0.85rem; }

      .section-hdr h3 { font-size: 1.8rem; }

      .awards-container {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .award-row { padding: 14px; }

      .film-card { padding: 8px; gap: 10px; }
      .film-poster { width: 65px; height: 98px; }

      .film-info .winner-name { font-size: 0.85rem; }
      .film-info .film-title { font-size: 0.78rem; }

      .modal-content {
        padding: 20px;
        width: 95%;
        border-radius: 16px;
      }
      .modal-title { font-size: 1.3rem; }

      .search-results { gap: 6px; }
      .sr-poster { width: 40px; height: 60px; }
      .sr-title { font-size: 0.82rem; }

      .stats-bar { gap: 16px; font-size: 0.6rem; flex-wrap: wrap; }
    }

    @media (max-width: 400px) {
      .page-content { padding: 12px 14px; }
      .years { grid-template-columns: repeat(3, 1fr); }
      .fest-tabs { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="bg-atmosphere"></div>

<div class="page-content">
  <header>
    <h1>Festival Awards Database</h1>
    <span class="author-tag">by Fer Rubino</span>
  </header>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search films, directors, awards...">
  </div>

  cannes: '<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAMAAABg3Am1AAAAUVBMVEUAAAAzMzMeHh4fHx8fHx8eHh4fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8eHh4fHx8fHx8fHx8fHx8fHx8fHx8gICAhISEeHh4fHx8fHx+OzK8nAAAAGnRSTlMAJu0GDkMz+NpMv7SVinJcFqxmYNS/oJyIcKgp7wgAAAFJSURBVEjH7ZXRkoMgDEUDCCJ2dW21/v+HLiS2VWl1px8w00czJB4IIeDNzb+oAeZPZk0DX82U+WAwp8mSmVamLMrsBIcBGr03nL3uEHhKINj3f/X5vMCdBJsCAbemyH4OWAxOaEwN3AN6KEGK2IQFULkByBcFHvq4F6DiJFPJIiHV1EY3J5h0YEvJEkdYCxYqZH98PrT4M1ZpirMx5PJhBBBv7qnBSIHinEn70JjPwuAAO/5eWXJCEoI2Zi8dGGIJv7UfREfrZYbfgDVrCcgxYZn2d01A+0LZGlh3xrXfhE+PBbBqzejzKsWxD3ldQSCk+OXcuvHI0elT5aJ01aLOe/cKFKXWl20VLqa5v1VvCXR0V7l2bE1UyNj7sYVSyQ+P+PVqD3dRUF9C3rvzEwPJBHK7x8Cv2Qr1qJJfxz82/qE8b8EHTMU10fAAAAABJRU5ErkJggg==" class="logo-img" alt="Cannes">',
  venice: '<img src="https://images.seeklogo.com/logo-png/8/1/la-biennale-venezia-logo-png_seeklogo-81175.png" class="logo-img" alt="Venecia">',
  berlin: '<img src="https://images.seeklogo.com/logo-png/31/1/berlin-international-film-festival-logo-png_seeklogo-316319.png" class="logo-img" alt="Berlín">',
  toronto: '<span style="font-size:1.4rem;font-weight:900;letter-spacing:-1px">TIFF</span>'
};

const state = { view: 'years', year: null, festival: null, search: '' };

document.getElementById('searchInput').addEventListener('input', function(e){
  state.search = e.target.value;
  if(state.search) { state.view='search'; }
  else { state.view='years'; state.year=null; state.festival=null; }
  render();
});

function updateStats(){
  let totalFilms = 0;
  Object.values(DATA).forEach(y => Object.values(y).forEach(f => totalFilms += f.length));
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `<span>📽️ <strong>${totalFilms}</strong> Films</span><span>📅 <strong>${Object.keys(DATA).length}</strong> Years</span><span>🎬 <strong>4</strong> Festivals</span>`;
}

function goBack(to){
  if(to==='years'){ state.view='years'; state.year=null; state.festival=null; }
  else if(to==='festivals'){ state.view='festivals'; state.festival=null; }
  render();
}

function render(){
  const app = document.getElementById('app');
  const q = state.search.toLowerCase();
  if(q) renderSearch(app, q);
  else if(state.view==='years') renderYears(app);
  else if(state.view==='festivals') { renderFestivals(app); setTimeout(scrollToActiveYear, 0); }
  else if(state.view==='awards') renderAwards(app);
  updateStats();
}

function renderYears(app){
  const years = Object.keys(DATA).sort((a,b)=>b-a);
  app.innerHTML = `
    <div class="year-grid">
      <h2>Select a Year</h2>
      <div class="years">
        ${years.map(yr => `<button class="yr-btn" onclick="state.year='${yr}';state.view='festivals';render()">
          ${yr}
          <div class="yr-dots">
            ${DATA[yr].cannes ? '<div class="dot dot-c"></div>' : ''}
            ${DATA[yr].venice ? '<div class="dot dot-v"></div>' : ''}
            ${DATA[yr].berlin ? '<div class="dot dot-b"></div>' : ''}
            ${DATA[yr].toronto ? '<div class="dot dot-t"></div>' : ''}
          </div>
        </button>`).join('')}
      </div>
    </div>`;
}

function renderYearScroller(currentYear) {
  const years = Object.keys(DATA).sort((a,b)=>b-a);
  return `<div class="year-scroller-wrap">
    <button class="ys-arrow left" onclick="scrollYears(-1)">&#8249;</button>
    <div class="year-scroller" id="yearScroller">
      ${years.map(yr => `<button class="ys-btn ${yr===currentYear?'active':''}" onclick="state.year='${yr}';state.festival=null;render()">${yr}</button>`).join('')}
    </div>
    <button class="ys-arrow right" onclick="scrollYears(1)">&#8250;</button>
  </div>`;
}

function scrollYears(dir) {
  const scroller = document.getElementById('yearScroller');
  if (scroller) scroller.scrollBy({ left: dir * 300, behavior: 'smooth' });
}

function scrollToActiveYear() {
  const scroller = document.getElementById('yearScroller');
  if (!scroller) return;
  const active = scroller.querySelector('.ys-btn.active');
  if (active) active.scrollIntoView({inline:'center', block:'nearest', behavior:'instant'});
}

function renderFestivals(app){
  const y = state.year;
  const fests = DATA[y];
  app.innerHTML = `
    <div class="fest-section">
      <button class="back-btn" onclick="goBack('years')">← All Years</button>
      ${renderYearScroller(y)}
      <div class="section-hdr">
        <h3>Festivals ${y}</h3>
        <div class="year-title">${y}</div>
      </div>
      <div class="fest-tabs">
        ${Object.keys(fests).map(f => `
          <div class="fest-tab" onclick="state.festival='${f}';state.view='awards';render()">
            <div class="fest-glow"></div>
            <div class="ft-icon">${festLogos[f]||''}</div>
            <div class="ft-name c-${f}">${festNames[f]}</div>
            <div class="ft-count">${fests[f].length} awards</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderAwards(app){
  const y = state.year, f = state.festival;
  const awards = DATA[y][f];
  const festColor = f;
  app.innerHTML = `
    <div class="fest-section">
      <button class="back-btn" onclick="goBack('festivals')">← Festivals ${y}</button>
      ${renderYearScroller(y)}
      <div class="section-hdr">
        <h3>${festLogos[f]||''} ${festNames[f]}</h3>
        <div class="year-title">${y}</div>
      </div>
      <div class="awards-container">
        ${awards.map(a => `
          <div class="award-row award-${festColor}" onclick="openModal('${a.title.replace(/'/g,"\\'")}','${y}','${f}')">
            <div class="award-title">${a.award}</div>
            <div class="carousel">
              <div class="film-card">
                ${a.poster
                  ? `<img class="film-poster" src="${a.poster}" alt="${a.title}" loading="lazy" onerror="this.style.display='none'">`
                  : `<div class="film-poster" style="background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center"><div class="no-poster">🎬</div></div>`}
                <div class="film-info">
                  <div class="winner-name">${a.title}</div>
                  <div class="film-director">${a.director}</div>
                  <div class="film-director" style="margin-top:2px;opacity:0.5">${a.country||''}</div>
                </div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderSearch(app, q){
  const results = [];
  Object.entries(DATA).forEach(([yr, fests]) => {
    Object.entries(fests).forEach(([f, awards]) => {
      awards.forEach(a => {
        const s = (a.title+' '+a.director+' '+a.award+' '+(a.cast||'')+' '+(a.country||'')).toLowerCase();
        if(s.includes(q)) results.push({...a, year:yr, fest:f});
      });
    });
  });
  app.innerHTML = `
    <div class="fest-section">
      <div style="font-size:0.65rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:12px;">
        Search Results — ${results.length} films found
      </div>
      <div class="search-results">
        ${results.slice(0,50).map(r => `
          <div class="search-result-card" onclick="state.search='';document.getElementById('searchInput').value='';state.year='${r.year}';state.festival='${r.fest}';state.view='awards';render();setTimeout(()=>openModal('${r.title.replace(/'/g,"\\'")}','${r.year}','${r.fest}'),100)">
            <div class="sr-poster">${r.poster ? `<img src="${r.poster}" alt="" loading="lazy">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.15);font-size:0.7rem">🎬</div>'}</div>
            <div class="sr-info">
              <div class="sr-title">${r.title}</div>
              <div class="sr-director">${r.director}</div>
              <div class="sr-meta">
                <span class="sr-tag ${r.fest}">${festNames[r.fest]}</span>
                <span class="sr-tag year">${r.year}</span>
                <span class="sr-award">${r.award}</span>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function openModal(title, year, fest){
  const awards = DATA[year][fest];
  const film = awards.find(a => a.title === title);
  if(!film) return;
  const modal = document.getElementById('filmModal');
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    ${film.poster ? `<img class="modal-poster" src="${film.poster}" alt="${film.title}">` : ''}
    <div class="modal-award ${fest}">🏆 ${film.award}</div>
    <div class="modal-title">${film.title}</div>
    <div class="modal-meta">
      <span>🎬 ${film.director}</span>
      <span>🌍 ${film.country || 'N/A'}</span>
      <span>📅 ${festNames[fest]} ${year}</span>
    </div>
    ${film.synopsis ? `<div class="modal-synopsis">${film.synopsis}</div>` : ''}
    ${film.cast ? `<div style="font-size:0.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:6px;">Cast</div><div style="font-size:0.82rem;color:rgba(255,255,255,0.4);line-height:1.5;">${film.cast}</div>` : ''}
  `;
  modal.classList.add('show');
}

function closeModal(){
  document.getElementById('filmModal').classList.remove('show');
}

document.getElementById('filmModal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeModal();
});

render();
</script>
</body>
</html>
