<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Year Selection Grid</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a; color:#fff;
    font-family:'Inter',-apple-system,sans-serif;
    min-height:100vh; overflow-x:hidden;
  }
  .bg-atmosphere {
    position:fixed; top:0; left:0; right:0; bottom:0; z-index:0; overflow:hidden;
  }
  .bg-atmosphere::before {
    content:''; position:absolute; top:10%; left:30%;
    width:50%; height:60%;
    background:radial-gradient(ellipse, rgba(20,70,80,0.18) 0%, transparent 65%);
    filter:blur(100px);
  }
  .bg-atmosphere::after {
    content:''; position:absolute; bottom:-5%; right:10%;
    width:40%; height:45%;
    background:radial-gradient(ellipse, rgba(60,30,80,0.1) 0%, transparent 65%);
    filter:blur(80px);
  }
  .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    padding:24px 40px;
  }
  .top-bar .logo { font-size:1rem; font-weight:800; letter-spacing:2px; opacity:0.6; }
  .top-bar .tag { font-size:0.7rem; font-weight:500; letter-spacing:3px; opacity:0.4; text-transform:uppercase; }

  /* ── Search ── */
  .search-wrap { padding:0 40px; margin-bottom:16px; }
  .search-bar {
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:50px; padding:12px 22px;
    max-width:380px;
    backdrop-filter:blur(20px);
  }
  .search-bar svg { opacity:0.35; flex-shrink:0; }
  .search-bar span { font-size:0.82rem; color:rgba(255,255,255,0.3); font-weight:400; }

  /* ── Stats ── */
  .stats-strip {
    display:flex; gap:32px; padding:14px 40px;
    border-top:1px solid rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .stats-strip span {
    font-size:0.65rem; font-weight:500; letter-spacing:2px;
    text-transform:uppercase; color:rgba(255,255,255,0.25);
  }
  .stats-strip strong { color:rgba(255,255,255,0.5); font-weight:700; }

  /* ── Section label ── */
  .section-label {
    padding:32px 40px 20px;
    font-size:0.65rem; font-weight:600;
    letter-spacing:4px; text-transform:uppercase;
    color:rgba(255,255,255,0.2);
  }

  /* ── Year grid ── */
  .year-grid {
    padding:0 40px 50px;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap:10px;
  }
  .year-card {
    position:relative;
    background:rgba(255,255,255,0.025);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    padding:22px 16px;
    text-align:center;
    cursor:pointer;
    transition: all 0.3s;
    overflow:hidden;
  }
  .year-card:hover {
    background:rgba(255,255,255,0.06);
    border-color:rgba(255,255,255,0.12);
    transform:translateY(-2px);
  }
  .year-card .yr {
    font-size:1.2rem;
    font-weight:800;
    letter-spacing:-0.5px;
    color:rgba(255,255,255,0.8);
    margin-bottom:8px;
  }
  .year-card .dots {
    display:flex; gap:4px; justify-content:center;
  }
  .year-card .dot {
    width:6px; height:6px; border-radius:50%;
  }
  .dot.c { background:#d4af37; }
  .dot.v { background:#c0392b; }
  .dot.b { background:#9b59b6; }
  .dot.t { background:#e74c3c; }

  /* Decade dividers */
  .decade-label {
    grid-column: 1 / -1;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
    padding: 12px 0 4px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  .bottom-bar {
    display:flex; justify-content:space-between; padding:20px 40px;
    border-top:1px solid rgba(255,255,255,0.04);
    margin-top:auto;
  }
  .bottom-bar span {
    font-size:0.6rem; font-weight:500; letter-spacing:2px;
    color:rgba(255,255,255,0.15); text-transform:uppercase;
  }
</style>
</head>
<body>

<div class="bg-atmosphere"></div>

<div class="page">
  <div class="top-bar">
    <div class="logo">FADb</div>
    <div class="tag">( by Fer Rubino )</div>
  </div>

  <div class="search-wrap">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Search films, directors, awards...</span>

  </div>

  <div class="stats-strip">

    <span>📅 <strong>36</strong> Years</span>
    <span>🎬 <strong>4</strong> Festivals</span>

  <div class="section-label">Select a Year</div>

  <div class="year-grid">
    <div class="decade-label">2020s</div>

    <div class="year-card"><div class="yr">2024</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2023</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2022</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2021</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2020</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>

    <div class="decade-label">2010s</div>
    <div class="year-card"><div class="yr">2019</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2018</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2017</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2016</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2015</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2014</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2013</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>

    <div class="year-card"><div class="yr">2011</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2010</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>

    <div class="decade-label">2000s</div>
    <div class="year-card"><div class="yr">2009</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2008</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2007</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2006</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2005</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
    <div class="year-card"><div class="yr">2004</div><div class="dots"><div class="dot c"></div><div class="dot v"></div><div class="dot b"></div><div class="dot t"></div></div></div>
  </div>

  <div class="bottom-bar">
    <span>Festival Awards Database</span>
    <span>( by Fer Rubino )</span>
  </div>
</div>
</body>
</html>
